; TBDS Control Server 配置文件

[server]
http.port = 8080
grpc.port = 9090

[log]
level = info

[mysql]
host = 127.0.0.1
port = 3306
user = root
password = root
database = woodpecker
max_open_conns = 50
max_idle_conns = 10
conn_max_lifetime_sec = 3600

[redis]
host = 127.0.0.1
port = 6379
password =
db = 1
pool_size = 20

[dispatcher]
; memStoreRefresher 刷新间隔（毫秒）
refresh.interval = 200
; cleanerWorker 清理间隔（毫秒）
cleaner.interval = 5000

[action]
; RedisActionLoader 扫描间隔（毫秒）
cache.interval = 100
; 每次从 DB 加载的 Action 批次大小
loader.batch.size = 2000
; Agent 每次拉取的 Action 批次大小
agent.fetch.batch.size = 20

[election]
; 分布式锁 Redis Key
redis.key = woodpecker:server:leader
; 锁过期时间（秒）
ttl = 30
; 续约间隔（秒）
renew.interval = 10
