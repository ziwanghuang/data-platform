; TBDS Control Agent 配置文件

[agent]
; 节点唯一标识（与 host 表的 uuid 对应）
host.uuid = node-001
; 节点 IP
host.ip = 10.0.0.1

[server]
; Server gRPC 地址
grpc.address = 10.0.0.100:9090

[log]
level = info

[cmd]
; 任务拉取间隔（毫秒）— 性能瓶颈之一
interval = 100
; 结果上报间隔（毫秒）
report.interval = 200
; 结果上报批次大小
report.batch.size = 6

[heartbeat]
; 心跳间隔（秒）
interval = 5

[workpool]
; 并发执行 Action 的最大协程数
max.workers = 50
